<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MITEC Worker Portal</title>
  <style>
    :root{
      --bg:#f2f3f5;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --line-focus:#cbd5e1;
      --primary:#0f4a82;
      --primary-dark:#0b3d6c;
      --danger:#b42318;
      --success:#027a48;
      --shadow:0 12px 30px rgba(15, 23, 42, 0.08);
      --radius-card:24px;
      --radius-input:14px;
      --radius-btn:14px;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:var(--bg); pi
      color:var(--text);
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .shell{
      width:100%;
      max-width:420px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius-card);
      box-shadow:var(--shadow);
      padding:28px 22px 22px;
    }

    .brand{
      display:flex;
      justify-content:center;
      margin-bottom:18px;
    }

    .brand img{
      width:120px;
      max-width:100%;
      height:auto;
      object-fit:contain;
    }

    .title{
      font-size:18px;
      font-weight:700;
      line-height:1.2;
      margin:0 0 6px;
    }

    .sub{
      margin:0 0 20px;
      font-size:13px;
      line-height:1.5;
      color:var(--muted);
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:600;
      margin-bottom:7px;
      color:var(--text);
    }

    .input{
      width:100%;
      height:50px;
      border:1px solid var(--line);
      border-radius:var(--radius-input);
      background:#fff;
      padding:0 14px;
      font-size:15px;
      color:var(--text);
      transition:border-color .2s ease, box-shadow .2s ease;
      appearance:none;
      -webkit-appearance:none;
    }

    .input::placeholder{
      color:#9ca3af;
    }

    .input:focus{
      outline:none;
      border-color:var(--line-focus);
      box-shadow:0 0 0 3px rgba(15, 74, 130, 0.08);
    }

    .btn{
      width:100%;
      height:50px;
      border:none;
      border-radius:var(--radius-btn);
      background:var(--primary);
      color:#fff;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:background .2s ease, transform .15s ease, opacity .2s ease;
      margin-top:4px;
    }

    .btn:hover{
      background:var(--primary-dark);
    }

    .btn:active{
      transform:scale(0.995);
    }

    .btn:disabled{
      opacity:.75;
      cursor:not-allowed;
    }

    .linkBtn{
      display:block;
      width:100%;
      text-align:center;
      margin-top:14px;
      font-size:13px;
      font-weight:600;
      color:var(--primary);
      text-decoration:none;
    }

    .linkBtn:hover{
      text-decoration:underline;
    }

    .msg{
      min-height:18px;
      margin-top:12px;
      font-size:13px;
      text-align:center;
    }

    .msg.error{
      color:var(--danger);
    }

    .msg.success{
      color:var(--success);
    }

    .footer{
      text-align:center;
      font-size:12px;
      color:#8b9099;
      margin-top:14px;
      line-height:1.5;
    }

    @media (max-width:480px){
      body{
        padding:18px;
      }

      .card{
        padding:24px 18px 20px;
        border-radius:22px;
      }

      .brand img{
        width:108px;
      }
    }
  </style>
</head>
<body>

  <div class="shell">
    <div class="card">
      <div class="brand">
        <img src="https://hercules-cdn.com/file_G1cF6VttU3RSj2DksyB2vBX6" alt="MITEC Logo">
      </div>

      <h1 class="title">Sign In</h1>
      <p class="sub">Use your registered phone number and IC or passport number.</p>

      <div class="field">
        <label for="phoneInput">Phone Number</label>
        <input
          id="phoneInput"
          class="input"
          type="text"
          inputmode="numeric"
          autocomplete="tel"
          placeholder="Example: 60123456789"
        >
      </div>

      <div class="field">
        <label for="docInput">IC / Passport Number</label>
        <input
          id="docInput"
          class="input"
          type="text"
          autocomplete="off"
          placeholder="Example: 010203145678"
        >
      </div>

      <button id="loginBtn" class="btn" onclick="handleLogin()">Login</button>

      <a href="129.html" class="linkBtn">Register / First Time User</a>

      <div id="loginMessage" class="msg"></div>
    </div>

    <div class="footer">
      Malaysia International Trade & Exhibition Centre
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwrwJOWtdhgYXq68exQ_g3ilaEwtsePumDBPiBbQzr5hGgcFmtUrfNRzAx4ho8dYjQKyw/exec";

    const phoneInput = document.getElementById("phoneInput");
    const docInput = document.getElementById("docInput");
    const loginBtn = document.getElementById("loginBtn");
    const msg = document.getElementById("loginMessage");

    function normalizePhone(value) {
      return String(value || "").replace(/[^\d]/g, "").trim();
    }

    function setMessage(text, type = "error") {
      msg.textContent = text || "";
      msg.className = "msg " + type;
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.textContent = isLoading ? "Checking..." : "Submit";
    }

    phoneInput.addEventListener("input", () => {
      phoneInput.value = normalizePhone(phoneInput.value);
    });

    [phoneInput, docInput].forEach(input => {
      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          handleLogin();
        }
      });
    });

    window.addEventListener("load", () => {
      phoneInput.focus();
    });

    async function handleLogin() {
      const phone = normalizePhone(phoneInput.value);
      const docNo = docInput.value.trim();

      setMessage("");

      if (!phone || !docNo) {
        setMessage("Please enter phone number and document number.", "error");
        return;
      }

      setLoading(true);

      try {
        const url = `${WEB_APP_URL}?action=check_existing&doc_no=${encodeURIComponent(docNo)}&phone=${encodeURIComponent(phone)}`;
        const res = await fetch(url);
        const data = await res.json();

        if (data && data.ok && data.exists && data.record) {
          setMessage("Login successful.", "success");

          localStorage.setItem("mitecWorkerRecord", JSON.stringify(data.record));
          localStorage.setItem("mcl_doc_no", docNo);
          localStorage.setItem("mcl_phone", phone);

          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 700);
        } else {
          setMessage(
            data && data.message ? data.message : "No worker record found.",
            "error"
          );
        }
      } catch (err) {
        console.error(err);
        setMessage("Server connection failed.", "error");
      } finally {
        setLoading(false);
      }
    }
  </script>

</body>
</html>
