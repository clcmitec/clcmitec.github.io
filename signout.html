<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITEC Sign Out</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:24px;
  border-radius:16px;
  width:340px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h3{margin-bottom:16px;}

input,select{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#0b3f6f;
  color:#fff;
  border-radius:10px;
  font-weight:bold;
}

.status{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="card">
  <h3>Sign Out</h3>

  <input id="voucher" placeholder="Voucher No">

  <select id="shiftEnd">
    <option value="">Select Shift End</option>
    <option value="1200">12:00</option>
    <option value="1300">13:00</option>
    <option value="1700">17:00</option>
    <option value="1900">19:00</option>
    <option value="2300">23:00</option>
  </select>

  <button onclick="submitSignOut()">Submit</button>

  <div class="status" id="status"></div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwrwJOWtdhgYXq68exQ_g3ilaEwtsePumDBPiBbQzr5hGgcFmtUrfNRzAx4ho8dYjQKyw/exec";

const docNo = localStorage.getItem("mcl_doc_no");

if(!docNo){
  alert("Please login first");
  window.location.href = "index.html";
}

// format 1300 → 13:00
function formatTime(val){
  val = val.toString().padStart(4,"0");
  return val.substring(0,2)+":"+val.substring(2,4);
}

async function submitSignOut(){

  const voucher = document.getElementById("voucher").value;
  const shiftEndRaw = document.getElementById("shiftEnd").value;
  const status = document.getElementById("status");

  if(!voucher || !shiftEndRaw){
    status.innerText = "Complete all fields";
    return;
  }

  const shiftEnd = formatTime(shiftEndRaw);

  status.innerText = "Submitting...";

  try{
    const res = await fetch(`${APPS_SCRIPT_URL}?action=signOut&doc_no=${docNo}&voucher=${voucher}&out=${shiftEnd}`);
    const data = await res.json();

    if(data.ok){
      status.innerText = "Sign Out recorded";

      document.getElementById("voucher").value = "";
      document.getElementById("shiftEnd").value = "";

      setTimeout(()=>{
        window.location.href = "dashboard.html";
      },1000);

    }else{
      status.innerText = data.message || "Error";
    }

  }catch(err){
    status.innerText = "Connection error";
  }
}
</script>

</body>
</html>
