<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MITEC Dashboard</title>
  <style>
    :root {
      --mitec-blue: #0f4a82;
      --mitec-blue-dark: #07223f;
      --bg: #f5f5f7; 
      --card: #ffffff;
      --text: #1d1d1f;
      --muted: #86868b;
      --accent: #000000;
      --shadow: 0 12px 30px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { 
      margin: 0; 
      padding: 20px 16px 120px; 
      background: var(--bg); 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: var(--text);
    }

    .shell { max-width: 440px; margin: 0 auto; }

    /* Minimalist Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .brand-img { height: 32px; width: auto; }

    .profile-trigger {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: var(--shadow);
      object-fit: cover;
      cursor: pointer;
    }

    /* Simple Greeting (Replaced Hero Card) */
    .welcome-wrap { margin-bottom: 24px; text-align: left; }
    .welcome-text { font-size: 14px; font-weight: 600; color: var(--muted); margin: 0; }
    .worker-name { font-size: 24px; font-weight: 800; color: var(--accent); margin: 4px 0 0; letter-spacing: -0.02em; }

    /* Highlighted Today Summary */
    .summary-highlight {
      background: var(--mitec-blue-dark);
      border-radius: 28px;
      padding: 24px;
      color: #fff;
      box-shadow: 0 20px 40px rgba(7, 34, 63, 0.2);
      margin-bottom: 12px;
    }

    .summary-title {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 18px;
      display: block;
      color: rgba(255,255,255,0.5);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .summary-item {
      background: rgba(255, 255, 255, 0.08);
      padding: 14px;
      border-radius: 18px;
    }

    .item-label { font-size: 9px; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.4); display: block; margin-bottom: 4px; }
    .item-value { font-size: 17px; font-weight: 700; color: #fff; display: block; }

    /* New Duty Actions Card */
    .action-card {
      background: var(--card);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .duty-btn {
      height: 54px;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.1s, opacity 0.2s;
    }

    .duty-btn:active { transform: scale(0.96); }

    .btn-in { background: var(--mitec-blue); color: #fff; }
    .btn-out { background: #f2f2f7; color: var(--text); }

    /* List Navigation */
    .section-label { 
      font-size: 11px; font-weight: 800; text-transform: uppercase; 
      letter-spacing: 0.08em; color: var(--muted); margin: 24px 0 12px 4px; 
      display: block; 
    }

    .nav-row {
      background: var(--card);
      border-radius: 18px;
      padding: 14px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .nav-info { display: flex; align-items: center; gap: 12px; }
    .nav-title { font-size: 15px; font-weight: 600; }
    .chevron { color: #c7c7cc; font-size: 18px; }

    /* Floating Dock */
    .bottom-nav {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 40px); max-width: 380px;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
      border-radius: 100px; display: flex; justify-content: space-around;
      padding: 10px; box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      z-index: 1000;
    }
    .nav-item { color: #fff; text-decoration: none; font-size: 20px; padding: 10px; opacity: 0.4; }
    .nav-item.active { opacity: 1; }

  </style>
</head>
<body>

  <div class="shell">
    
    <header class="header">
      <img class="brand-img" src="https://mitec.com.my/static/img/logos/mitec-new-logo.png" alt="MITEC">
      <img id="headerPhoto" class="profile-trigger" src="https://via.placeholder.com/100" onclick="goToPage('profile.html')">
    </header>

    <div class="welcome-wrap">
      <p class="welcome-text">Hello,</p>
      <h1 class="worker-name" id="heroName">LOADING...</h1>
    </div>

    <section class="summary-highlight">
      <span class="summary-title">Shift Activity</span>
      <div class="summary-grid">
        <div class="summary-item">
          <span class="item-label">In</span>
          <span class="item-value" id="dashSignIn">--:--</span>
        </div>
        <div class="summary-item">
          <span class="item-label">Out</span>
          <span class="item-value" id="dashSignOut">--:--</span>
        </div>
        <div class="summary-item">
          <span class="item-label">Voucher</span>
          <span class="item-value" id="dashVoucher">-</span>
        </div>
        <div class="summary-item">
          <span class="item-label">Hours</span>
          <span class="item-value" id="dashHours">0.0</span>
        </div>
      </div>
    </section>

    <div class="action-card">
      <div class="action-grid">
        <button class="duty-btn btn-in" onclick="goToPage('signin.html')">
          <span>Sign In</span>
        </button>
        <button class="duty-btn btn-out" onclick="goToPage('https://forms.gle/zCh5wdVwkkkMFTuC6')">
          <span>Sign Out</span>
        </button>
      </div>
    </div>

    <span class="section-label">Services</span>
    
    <a href="attendance.html" class="nav-row">
      <div class="nav-info">
        <span class="nav-title">Attendance History</span>
      </div>
      <span class="chevron">›</span>
    </a>

    <a href="profile.html" class="nav-row">
      <div class="nav-info">
        <span class="nav-title">Worker Profile</span>
      </div>
      <span class="chevron">›</span>
    </a>

    <a href="#" onclick="logout()" class="nav-row">
      <div class="nav-info">
        <span class="nav-title" style="color: #ff3b30;">Logout</span>
      </div>
      <span class="chevron">›</span>
    </a>

  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">🏠</a>
    <a href="attendance.html" class="nav-item">📊</a>
    <a href="profile.html" class="nav-item">👤</a>
  </nav>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwrwJOWtdhgYXq68exQ_g3ilaEwtsePumDBPiBbQzr5hGgcFmtUrfNRzAx4ho8dYjQKyw/exec";

    function getStoredWorker() {
      return JSON.parse(localStorage.getItem("mitecWorkerRecord") || "{}");
    }

    async function fillWorkerData() {
      const worker = getStoredWorker();
      const docNo = worker.mykad_passport_no || localStorage.getItem("mcl_doc_no"); 

      // Set Name & Photo
      document.getElementById("heroName").textContent = (worker.name_mykad || "WORKER").toUpperCase();
      const photo = worker.photo_link || "";
      if (photo) document.getElementById("headerPhoto").src = photo;

      // Fetch Today's Live Summary
      if (docNo) {
        try {
          const res = await fetch(`${WEB_APP_URL}?action=get_today_summary&doc_no=${encodeURIComponent(docNo)}`, { cache: "no-cache" });
          const data = await res.json();
          if (data.ok && data.summary) {
            document.getElementById("dashSignIn").textContent = data.summary.sign_in_time || "--:--";
            document.getElementById("dashSignOut").textContent = data.summary.sign_out_time || "--:--";
            document.getElementById("dashVoucher").textContent = data.summary.voucher_no || "-";
            document.getElementById("dashHours").textContent = data.summary.hours_worked || "0.0";
          }
        } catch (e) { console.error("Summary load error", e); }
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

    function goToPage(url) { window.location.href = url; }

    window.addEventListener("DOMContentLoaded", () => {
      if (!localStorage.getItem("mitecWorkerRecord")) {
        window.location.href = "index.html";
      } else {
        fillWorkerData();
      }
    });
  </script>
</body>
</html>
