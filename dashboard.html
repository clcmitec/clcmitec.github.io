<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MITEC Dashboard</title>
  <style>
    :root {
      --mitec-blue: #0f4a82;
      --mitec-blue-dark: #07223f;
      --bg: #f5f5f7; /* Apple Gray */
      --card: #ffffff;
      --text: #1d1d1f;
      --muted: #86868b;
      --accent: #000000; /* Adidas Black */
      --shadow: 0 12px 30px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { 
      margin: 0; 
      padding: 20px 16px 100px; 
      background: var(--bg); 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: var(--text);
    }

    .shell { max-width: 440px; margin: 0 auto; }

    /* Centered Header (Apple Approach) */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 30px;
      padding-top: 10px;
    }
    
    .brand-img { width: 100px; margin-bottom: 15px; }

    .profile-trigger {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: var(--shadow);
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .profile-trigger:active { transform: scale(0.92); }

    /* Highlighted Today Summary (The Hero) */
    .summary-highlight {
      background: var(--mitec-blue-dark);
      border-radius: 32px;
      padding: 24px;
      color: #fff;
      box-shadow: 0 20px 40px rgba(7, 34, 63, 0.25);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .summary-highlight::after {
      content: ""; position: absolute; top: -50%; right: -20%;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    }

    .summary-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      display: block;
      color: rgba(255,255,255,0.6);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .summary-item {
      background: rgba(255, 255, 255, 0.08);
      padding: 16px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
    }

    .item-label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: rgba(255,255,255,0.5); display: block; margin-bottom: 4px; }
    .item-value { font-size: 18px; font-weight: 700; color: #fff; display: block; }

    /* Welcome Text */
    .welcome-wrap { margin-bottom: 24px; text-align: center; }
    .welcome-text { font-size: 14px; font-weight: 600; color: var(--muted); margin: 0; }
    .worker-name { font-size: 26px; font-weight: 800; color: var(--accent); margin: 4px 0 0; letter-spacing: -0.03em; }

    /* Navigation Rows (Adidas/Stark Style) */
    .section-label { 
      font-size: 11px; font-weight: 800; text-transform: uppercase; 
      letter-spacing: 0.1em; color: var(--muted); margin: 30px 0 15px 5px; 
      display: block; 
    }

    .action-row {
      background: var(--card);
      border-radius: 20px;
      padding: 8px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }
    .action-row:active { transform: scale(0.98); }

    .action-info { display: flex; align-items: center; gap: 15px; padding: 10px; }
    .action-icon { 
      width: 44px; height: 44px; background: var(--bg); 
      border-radius: 12px; display: flex; align-items: center; 
      justify-content: center; font-size: 20px; 
    }
    .action-title { font-size: 15px; font-weight: 700; display: block; }
    .action-sub { font-size: 12px; color: var(--muted); display: block; }
    .chevron { margin-right: 15px; color: #d2d2d7; font-weight: bold; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 32px); max-width: 400px;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
      border-radius: 100px; display: flex; justify-content: space-around;
      padding: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .nav-item { color: #fff; text-decoration: none; font-size: 22px; padding: 10px; opacity: 0.5; }
    .nav-item.active { opacity: 1; color: #fff; }

  </style>
</head>
<body>

  <div class="shell">
    
    <header class="header">
      <img class="brand-img" src="https://mitec.com.my/static/img/logos/mitec-new-logo.png" alt="MITEC">
      <img id="headerPhoto" class="profile-trigger" src="https://via.placeholder.com/100" onclick="goToPage('profile.html')">
    </header>

    <div class="welcome-wrap">
      <p class="welcome-text">Good day,</p>
      <h1 class="worker-name" id="heroName">LOADING...</h1>
    </div>

    <section class="summary-highlight">
      <span class="summary-title">Today's Activity</span>
      <div class="summary-grid">
        <div class="summary-item">
          <span class="item-label">Sign In</span>
          <span class="item-value" id="dashSignIn">--:--</span>
        </div>
        <div class="summary-item">
          <span class="item-label">Sign Out</span>
          <span class="item-value" id="dashSignOut">--:--</span>
        </div>
        <div class="summary-item">
          <span class="item-label">Voucher</span>
          <span class="item-value" id="dashVoucher">-</span>
        </div>
        <div class="summary-item">
          <span class="item-label">Hours</span>
          <span class="item-value" id="dashHours">0.0</span>
        </div>
      </div>
    </section>

    <span class="section-label">Quick Access</span>
    
    <a href="signin.html" class="action-row">
      <div class="action-info">
        <div class="action-icon">📥</div>
        <div>
          <span class="action-title">Clock In</span>
          <span class="action-sub">Register today's shift</span>
        </div>
      </div>
      <span class="chevron">›</span>
    </a>

    <a href="attendance.html" class="action-row">
      <div class="action-info">
        <div class="action-icon">🗓️</div>
        <div>
          <span class="action-title">Attendance History</span>
          <span class="action-sub">View past records</span>
        </div>
      </div>
      <span class="chevron">›</span>
    </a>

    <a href="profile.html" class="action-row">
      <div class="action-info">
        <div class="action-icon">👤</div>
        <div>
          <span class="action-title">My Profile</span>
          <span class="action-sub">Update personal details</span>
        </div>
      </div>
      <span class="chevron">›</span>
    </a>

  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">🏠</a>
    <a href="attendance.html" class="nav-item">📊</a>
    <a href="profile.html" class="nav-item">⚙️</a>
    <a href="#" onclick="logout()" class="nav-item">🚪</a>
  </nav>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwrwJOWtdhgYXq68exQ_g3ilaEwtsePumDBPiBbQzr5hGgcFmtUrfNRzAx4ho8dYjQKyw/exec";

    function getStoredWorker() {
      return JSON.parse(localStorage.getItem("mitecWorkerRecord") || "{}");
    }

    async function fillWorkerData() {
      const worker = getStoredWorker();
      const docNo = worker.mykad_passport_no || localStorage.getItem("mcl_doc_no"); 

      // Set Name & Photo
      document.getElementById("heroName").textContent = (worker.name_mykad || "WORKER").toUpperCase();
      const photo = worker.photo_link || "";
      if (photo) document.getElementById("headerPhoto").src = photo;

      // Fetch Today's Live Summary
      if (docNo) {
        try {
          const res = await fetch(`${WEB_APP_URL}?action=get_today_summary&doc_no=${encodeURIComponent(docNo)}`);
          const data = await res.json();
          if (data.ok && data.summary) {
            document.getElementById("dashSignIn").textContent = data.summary.sign_in_time || "--:--";
            document.getElementById("dashSignOut").textContent = data.summary.sign_out_time || "--:--";
            document.getElementById("dashVoucher").textContent = data.summary.voucher_no || "-";
            document.getElementById("dashHours").textContent = data.summary.hours_worked || "0.0";
          }
        } catch (e) { console.error("Summary load error", e); }
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

    function goToPage(url) { window.location.href = url; }

    window.addEventListener("DOMContentLoaded", () => {
      if (!localStorage.getItem("mitecWorkerRecord")) {
        window.location.href = "index.html";
      } else {
        fillWorkerData();
      }
    });
  </script>
</body>
</html>
