<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITEC Worker Dashboard</title>

<style>

:root{
--bg:#f3f4f6;
--card:#ffffff;
--text:#0f172a;
--muted:#667085;
--line:#e5e7eb;
--primary:#0f4a82;
--danger:#b42318;
--shadow:0 10px 28px rgba(2,18,34,.08);
--shadow-strong:0 16px 36px rgba(2,18,34,.14);
}

*{box-sizing:border-box}

html,body{
margin:0;
padding:0;
background:var(--bg);
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
color:var(--text);
}

body{
padding:14px 12px 92px;
}

.shell{
width:100%;
max-width:430px;
margin:0 auto;
}

.topbar{
background:#fff;
border-radius:18px;
box-shadow:var(--shadow);
padding:10px 12px;
margin-bottom:12px;
}

.topbarRow{
display:flex;
align-items:center;
gap:10px;
}

.brandLogoLarge{
width:40px;
height:40px;
object-fit:contain;
}

.brandTitleSingle{
flex:1;
font-size:15px;
font-weight:900;
color:var(--primary);
margin:0;
}

.headerPhoto{
width:40px;
height:40px;
border-radius:50%;
border:2px solid #e5e7eb;
object-fit:cover;
cursor:pointer;
}

.hero{
border-radius:24px;
padding:22px 18px;
margin-bottom:12px;
background:
linear-gradient(rgba(8,35,66,.75), rgba(8,35,66,.82)),
url("https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=1200&q=80") center/cover no-repeat;
box-shadow:var(--shadow-strong);
color:#fff;
}

.heroClock{
display:flex;
justify-content:space-between;
align-items:flex-end;
margin-bottom:12px;
padding:10px 12px;
border-radius:14px;
background:rgba(255,255,255,.12);
}

.heroClockDate{
font-size:12px;
font-weight:700;
}

.heroClockTime{
font-size:22px;
font-weight:900;
}

.heroTitle{
margin:0 0 8px;
font-size:22px;
font-weight:900;
letter-spacing:-0.02em;
text-transform:uppercase;
}

.heroText{
margin:0 0 16px;
font-size:13px;
line-height:1.5;
color:rgba(255,255,255,.92);
}

.heroActions{
display:grid;
gap:10px;
}

.heroBtn{
width:100%;
height:52px;
border:none;
border-radius:14px;
background:#fff;
color:var(--primary);
font-weight:800;
font-size:14px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
box-shadow:0 8px 18px rgba(0,0,0,.10);
}

.card{
background:#fff;
border-radius:20px;
box-shadow:var(--shadow);
padding:16px;
margin-bottom:12px;
}

.sectionTitle{
margin:0 0 10px;
font-size:16px;
font-weight:900;
color:var(--primary);
}

.miniGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:9px;
}

.miniBox{
border:1px solid var(--line);
border-radius:14px;
padding:11px;
}

.miniLabel{
font-size:10px;
font-weight:800;
color:var(--muted);
text-transform:uppercase;
margin-bottom:5px;
}

.miniValue{
font-size:13px;
font-weight:700;
}

.rowList{
display:grid;
gap:9px;
}

.rowLink{
width:100%;
border:none;
border-radius:14px;
background:#fff;
box-shadow:inset 0 0 0 1px var(--line);
padding:13px 14px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.rowTitle{
font-size:13px;
font-weight:800;
}

.rowSub{
font-size:11px;
color:var(--muted);
}

.arrow{
font-size:18px;
color:#9ca3af;
}

.logoutBtn{
width:100%;
height:48px;
border:none;
border-radius:14px;
background:var(--danger);
color:#fff;
font-weight:800;
cursor:pointer;
}

.footerNote{
text-align:center;
font-size:11px;
color:#8b9099;
line-height:1.55;
}

.bottomNav{
position:fixed;
left:50%;
bottom:14px;
transform:translateX(-50%);
width:calc(100% - 24px);
max-width:430px;
background:rgba(255,255,255,.96);
border-radius:20px;
box-shadow:0 12px 30px rgba(2,18,34,.14);
display:grid;
grid-template-columns:repeat(5,1fr);
padding:8px 6px;
}

.bottomNavItem{
border:none;
background:transparent;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:11px;
color:#667085;
cursor:pointer;
}

.bottomNavItem.active{
color:var(--primary);
}

</style>
</head>

<body>

<div class="shell">

<div class="topbar">
<div class="topbarRow">

<img class="brandLogoLarge"
src="https://mitec.com.my/static/img/logos/mitec-new-logo.png">

<h1 class="brandTitleSingle">MITEC Casual Labour</h1>

<img id="headerPhoto"
class="headerPhoto"
src="https://ui-avatars.com/api/?name=Worker&background=0f4a82&color=fff&size=200"
onclick="goToPage('profile.html')">

</div>
</div>


<section class="hero">

<div class="heroClock">
<div class="heroClockDate" id="liveDate">-</div>
<div class="heroClockTime" id="liveTime">-</div>
</div>

<h2 class="heroTitle" id="heroName">WORKER NAME</h2>

<p class="heroText">
This dashboard centralises your bookings, attendance and records.
</p>

<div class="heroActions">

<button class="heroBtn"
onclick="goToPage('signin.html')">
☐ Sign In
</button>

<button class="heroBtn"
onclick="window.location.href='https://forms.gle/cE6wDc2has6qvPhj7'">
▣ Sign Out
</button>

</div>

</section>


<div class="card">
<h3 class="sectionTitle">Today Summary</h3>

<div class="miniGrid">

<div class="miniBox">
<div class="miniLabel">Sign In Time</div>
<div class="miniValue" id="dashSignIn">-</div>
</div>

<div class="miniBox">
<div class="miniLabel">Sign Out Time</div>
<div class="miniValue" id="dashSignOut">-</div>
</div>

<div class="miniBox">
<div class="miniLabel">Voucher No</div>
<div class="miniValue" id="dashVoucher">-</div>
</div>

<div class="miniBox">
<div class="miniLabel">Hours Worked</div>
<div class="miniValue" id="dashHours">-</div>
</div>

</div>
</div>


<div class="card">
<h3 class="sectionTitle">Records & Services</h3>

<div class="rowList">

<button class="rowLink" onclick="goToPage('signin.html')">
<div>
<div class="rowTitle">Sign In</div>
<div class="rowSub">Record attendance and voucher</div>
</div>
<div class="arrow">›</div>
</button>

<button class="rowLink" onclick="goToPage('129.html')">
<div>
<div class="rowTitle">Attendance</div>
<div class="rowSub">Clock in / clock out</div>
</div>
<div class="arrow">›</div>
</button>

<button class="rowLink" onclick="goToPage('profile.html')">
<div>
<div class="rowTitle">My Profile</div>
<div class="rowSub">Worker registration info</div>
</div>
<div class="arrow">›</div>
</button>

<button class="rowLink" onclick="goToPage('faq.html')">
<div>
<div class="rowTitle">FAQ</div>
<div class="rowSub">Important guidance</div>
</div>
<div class="arrow">›</div>
</button>

<button class="rowLink" onclick="goToPage('feedback-form.html')">
<div>
<div class="rowTitle">Feedback</div>
<div class="rowSub">Report issues</div>
</div>
<div class="arrow">›</div>
</button>

</div>
</div>


<div class="card">
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>

<div class="footerNote">
MITEC Casual Labour Attendance System<br>
Human Resources Department
</div>

</div>


<nav class="bottomNav">

<button class="bottomNavItem active"
onclick="goToPage('dashboard.html')">
⌂ Home
</button>

<button class="bottomNavItem"
onclick="goToPage('129.html')">
◷ Clock
</button>

<button class="bottomNavItem"
onclick="goToPage('signin.html')">
📄 Sign In
</button>

<button class="bottomNavItem"
onclick="goToPage('feedback-form.html')">
✉ Docs
</button>

<button class="bottomNavItem"
onclick="goToPage('profile.html')">
◉ Profile
</button>

</nav>


<script>

function goToPage(page){
window.location.href=page;
}

function logout(){
localStorage.removeItem("mitecWorkerRecord");
localStorage.removeItem("mcl_doc_no");
localStorage.removeItem("mcl_phone");
window.location.href="index.html";
}

function startClock(){

function update(){

const now=new Date();

const date=now.toLocaleDateString("en-GB",{
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
});

const time=now.toLocaleTimeString("en-GB",{
hour:"2-digit",
minute:"2-digit",
second:"2-digit"
});

document.getElementById("liveDate").textContent=date;
document.getElementById("liveTime").textContent=time;

}

update();
setInterval(update,1000);

}

window.addEventListener("load",startClock);

</script>

</body>
</html>
